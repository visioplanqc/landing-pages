  <!-- ── HERO ────────────────────────────────────────────────────── -->
  <script type="text/babel">
/* global React */
const { useState: useHeroState } = React;

function UnicoHero() {
  const [submitted, setSubmitted] = useHeroState(false);
  const [submitting, setSubmitting] = useHeroState(false);
  const [formError, setFormError] = useHeroState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    setFormError('');
    const params = new URLSearchParams(window.location.search);
    const gclid  = params.get('gclid')  || '';
    const fbclid = params.get('fbclid') || '';
    const source = gclid ? 'google' : fbclid ? 'facebook' : 'direct';
    const data = {
      first_name: e.target.first_name.value,
      last_name:  e.target.last_name.value,
      phone:      e.target.phone.value,
      email:      e.target.email.value,
      address:    e.target.address.value,
      budget:     e.target.budget.value,
      source,
      gclid,
    };
    try {
      await fetch(window.UNICO_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      setSubmitting(false);
      setSubmitted(true);
      // if (typeof fbq !== 'undefined') fbq('track', 'Lead');
      // if (typeof gtag !== 'undefined') gtag('event','conversion',{send_to:'GOOGLE_ADS_ID_HERE/CONV_LABEL'});
    } catch (err) {
      setFormError('Une erreur est survenue. Veuillez réessayer.');
      setSubmitting(false);
    }
  };

  return (
    <section id="soumission" style={{position:"relative",overflow:"hidden",minHeight:720,display:"flex",alignItems:"stretch"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"url('https://qetnitjslapfzemmelkr.supabase.co/storage/v1/object/public/client-photos/unico/hero.jpg')",backgroundSize:"cover",backgroundPosition:"center"}} />
      <div style={{position:"absolute",inset:0,background:"linear-gradient(95deg,rgba(20,20,19,0.82) 0%,rgba(20,20,19,0.55) 50%,rgba(20,20,19,0.25) 100%)"}} />
      <div style={{position:"relative",zIndex:1,maxWidth:1200,margin:"0 auto",padding:"100px 24px 72px",width:"100%",boxSizing:"border-box",display:"grid",gridTemplateColumns:"1.05fr 0.95fr",gap:56,alignItems:"center"}}>
        {/* LEFT: pitch */}
        <div style={{color:"#fff"}}>
          <div style={{fontFamily:"Lato,sans-serif",fontSize:12,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:"#F1F1F1",opacity:0.9,marginBottom:18}}>Aménagement paysager · Clé en main</div>
          <h1 style={{fontFamily:"Lato,sans-serif",fontWeight:900,fontSize:64,lineHeight:1,letterSpacing:"0.02em",textTransform:"uppercase",margin:0,textShadow:"0 2px 24px rgba(0,0,0,.25)"}}>
            Votre cour.<br />
            <span style={{color:"#F8010C"}}>Clé en main.</span>
          </h1>
          <p style={{fontFamily:"Lato,sans-serif",fontSize:17,lineHeight:1.55,color:"#F1F1F1",marginTop:22,maxWidth:520}}>
            Plan&nbsp;3D gratuit, prix fournisseur direct, et un réseau de 30&nbsp;+&nbsp;paysagistes partenaires pour livrer votre projet sans intermédiaire.
          </p>
          <ul style={{margin:"26px 0 0",padding:0,listStyle:"none",display:"flex",flexDirection:"column",gap:10,maxWidth:520}}>
            {["Plan 3D complet de votre projet, gratuit","Prix fournisseur direct, sans intermédiaire","Réponse sous 24 h, aucun engagement"].map((b)=>(
              <li key={b} style={{display:"flex",gap:12,alignItems:"flex-start",fontFamily:"Lato,sans-serif",fontSize:15,color:"#F1F1F1"}}>
                <i data-lucide="check" style={{width:18,height:18,color:"#F8010C",flexShrink:0,marginTop:2}} />
                <span>{b}</span>
              </li>
            ))}
          </ul>
        </div>

        {/* RIGHT: form card */}
        <form style={{background:"#fff",borderRadius:10,padding:"28px 28px 22px",boxShadow:"0 24px 56px rgba(0,0,0,.5)",display:"flex",flexDirection:"column",gap:12,alignSelf:"center"}} onSubmit={handleSubmit}>
          {submitted ? (
            <div style={{textAlign:"center",padding:"24px 8px"}}>
              <i data-lucide="check-circle" style={{width:40,height:40,color:"#F8010C"}} />
              <h3 className="unico-h3" style={{marginTop:14}}>Merci&nbsp;!</h3>
              <p className="unico-body" style={{color:"#4A4A4A",marginTop:6}}>
                Un conseiller Unico vous rappelle dans les 24&nbsp;h pour planifier votre visite à domicile.
              </p>
            </div>
          ) : (
            <React.Fragment>
              <div style={{fontFamily:"Lato,sans-serif",fontSize:11,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",color:"#F8010C"}}>Soumission gratuite · 60 secondes</div>
              <h3 style={{fontFamily:"Lato,sans-serif",fontWeight:900,fontSize:24,color:"#141413",textTransform:"uppercase",letterSpacing:"0.03em",margin:"2px 0 8px"}}>Démarrer ma soumission</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div className="unico-field">
                  <label className="unico-field__label">Prénom</label>
                  <input className="unico-field__input" name="first_name" placeholder="Marie" required />
                </div>
                <div className="unico-field">
                  <label className="unico-field__label">Nom</label>
                  <input className="unico-field__input" name="last_name" placeholder="Tremblay" required />
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div className="unico-field">
                  <label className="unico-field__label">Téléphone</label>
                  <input className="unico-field__input" name="phone" type="tel" placeholder="418 555-0102" required />
                </div>
                <div className="unico-field">
                  <label className="unico-field__label">Courriel</label>
                  <input className="unico-field__input" name="email" type="email" placeholder="marie@exemple.com" required />
                </div>
              </div>
              <div className="unico-field">
                <label className="unico-field__label">Adresse du projet</label>
                <input className="unico-field__input" name="address" placeholder="123 rue Principale, Québec, QC" required />
              </div>
              <div className="unico-field">
                <label className="unico-field__label">Budget approximatif</label>
                <select className="unico-field__input" name="budget" required defaultValue="">
                  <option value="" disabled>Sélectionnez une fourchette</option>
                  <option>Moins de 10 000 $</option>
                  <option>10 000 $ – 25 000 $</option>
                  <option>25 000 $ – 50 000 $</option>
                  <option>50 000 $ – 100 000 $</option>
                  <option>Plus de 100 000 $</option>
                </select>
              </div>
              {formError && <p style={{color:"#F8010C",fontSize:13,margin:0}}>{formError}</p>}
              <button type="submit" className="unico-btn unico-btn--primary unico-btn--lg" style={{width:"100%",marginTop:6}} disabled={submitting}>
                {submitting ? 'Envoi en cours…' : 'Obtenir ma soumission gratuite'}
              </button>
              <div style={{fontFamily:"Lato,sans-serif",fontSize:11,color:"#767676",textAlign:"center",marginTop:2}}>
                Aucune carte requise · Aucun engagement
              </div>
            </React.Fragment>
          )}
        </form>
      </div>
    </section>
  );
}
window.UnicoHero = UnicoHero;
  </script>

  <script type="text/babel">
/* global React */
function UnicoHowItWorks() {

    { num:"01", icon:"home",   title:"Visite à domicile",      body:"Un conseiller Unico vient évaluer votre cour, comprendre vos besoins et prendre les mesures." },
    { num:"02", icon:"ruler",  title:"Plan 3D gratuit",         body:"Vous recevez un plan 3D complet et le prix exact des matériaux, sans engagement." },
    { num:"03", icon:"hammer", title:"Installation clé en main", body:"Un de nos 30+ paysagistes partenaires réalise le projet. Garanti, sans intermédiaire." },
  ];
  return (
    <section id="processus" style={{background:"#F1F1F1"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"80px 24px"}}>
        <div style={{marginBottom:36,maxWidth:720}}>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:18}}>

}
